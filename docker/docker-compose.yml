# Orquestación local de CheckList (desarrollo/operación). Contenedor único + volumen del .db.
# Uso: desde la raíz del repo -> `docker compose -f docker/docker-compose.yml up --build`
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: checklist:local
    ports:
      - '${PORT:-3000}:3000'
    environment:
      PORT: '3000'
      NODE_ENV: production
      # El .db vive en el volumen persistente montado en /app/data.
      DATABASE_URL: /app/data/checklist.db
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      MAX_TAREAS: ${MAX_TAREAS:-100}
      MAX_TITULO_LEN: ${MAX_TITULO_LEN:-120}
      MAX_DESC_LEN: ${MAX_DESC_LEN:-2000}
    volumes:
      - checklist-data:/app/data
    restart: unless-stopped

volumes:
  checklist-data:
